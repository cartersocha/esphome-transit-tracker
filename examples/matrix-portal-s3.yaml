esphome:
  name: transit-tracker-s3
  friendly_name: Transit Tracker
  # hub75 PR #13921 (runtime set_rotation) requires a recent esphome
  min_version: 2026.5.3

esp32:
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

psram:
  mode: quad
  speed: 80MHz

external_components:
  - source:
      type: local
      path: ../components
  # hub75 with runtime set_rotation() support (esphome PR #13921 — not in stable yet)
  - source: github://pr#13921
    components: [ hub75 ]
    refresh: 1h
  # LIS3DH accelerometer driver (provides the orientation_xy text sensor)
  - source: github://tjhorner/esphome-custom-components@157c1c216ab296fd2cecc197728f9cbb909344d3
    components: [ lis3dh ]

logger:
  level: DEBUG
  logs:
    sensor: ERROR
    text_sensor: ERROR

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: "NONE"

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "TransitTracker Fallback Hotspot"
    password: "59541bEJiaf3"

display:
  - platform: hub75
    id: matrix
    board: adafruit-matrix-portal-s3
    double_buffer: true
    update_interval: 32ms
    clock_speed: 16MHz
    panel_width: 64
    panel_height: 32
    layout_cols: 2
    # We swap the G and B channels in firmware because the 64x32 panel hardware has them reversed
    g1_pin: 40
    b1_pin: 41
    g2_pin: 37
    b2_pin: 39
    e_pin: 21
    brightness: 255
    lambda: |-
      id(tracker).draw_schedule();

font:
  - file: "fonts/Pixolletta8px.ttf"
    id: pixolletta
    size: 10
    glyphs:
      - abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.,:;!?()"'-+/*=%@#[]{}<>|&^~
      - " "

time:
  - platform: sntp
    id: sntp_time
    timezone: America/Los_Angeles

# --- Auto display orientation (onboard LIS3DH accelerometer) ---
# Mirrors the Transit Tracker product: read the accelerometer and rotate the
# matrix 0deg/180deg so the display stays upright however the unit is mounted.
i2c:
  sda: GPIO16
  scl: GPIO17

lis3dh:
  range: 2G
  data_rate: 1HZ
  resolution: HIGH_RES
  address: 0x19
  update_interval: 1s

text_sensor:
  - platform: lis3dh
    orientation_xy:
      id: orientation_sensor
      on_value:
        - lambda: |-
            if (x == "Portrait Upside Down") {
              id(matrix).set_rotation(esphome::display::DisplayRotation::DISPLAY_ROTATION_180_DEGREES);
            } else if (x == "Portrait Upright") {
              id(matrix).set_rotation(esphome::display::DisplayRotation::DISPLAY_ROTATION_0_DEGREES);
            }

color:
  - id: route_44_purple
    hex: "840AFD"
  - id: e_line_red
    hex: "9C182F"

transit_tracker:
  id: tracker
  base_url: "wss://tt.horner.tj/"
  limit: 12
  feed_code: "st"
  list_mode: "doubleTime"
  scroll_headsigns: true
  show_units: "short"
  stops:
    - stop_id: "1_29557" # Route 44 @ UW
      routes:
        - "1_100224" # 44
    - stop_id: "1_29231" # Route 44 @ Ballard
      routes:
        - "1_100224" # 44
    - stop_id: "1_75408" # E Line @ Downtown
      routes:
        - "1_102615" # E Line
  styles:
    - route_id: "1_100224"
      name: "44"
      color: route_44_purple
    - route_id: "1_102615"
      name: "E"
      color: e_line_red
  abbreviations:
    - from: "Seattle"
      to: ""
    - from: "Ballard Wallingford"
      to: "Ballard"
    - from: "University Of Washington Medical Center Wallingford"
      to: "UW"
    - from: "University District"
      to: "UW"
