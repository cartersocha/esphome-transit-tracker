esphome:
  name: transit-tracker
  friendly_name: Transit Tracker

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

external_components:
  - source: github://TillFleisch/ESPHome-HUB75-MatrixDisplayWrapper@main
  - source:
      type: local
      path: ../components

logger:
  level: DEBUG
  logs:
    sensor: ERROR
    text_sensor: ERROR

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: ""
  password: ""
  power_save_mode: "NONE"

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "TransitTracker Fallback Hotspot"
    password: "59541bEJiaf3"

display:
  - platform: hub75_matrix_display
    id: matrix
    width: 64
    height: 32
    chain_length: 2
    R1_pin: 42
    G1_pin: 40
    B1_pin: 41
    R2_pin: 38
    G2_pin: 37
    B2_pin: 39
    A_pin: 45
    B_pin: 36
    C_pin: 48
    D_pin: 35
    E_pin: 21
    LAT_pin: 47
    OE_pin: 14
    CLK_pin: 2
    clock_phase: false
    i2sspeed: HZ_10M
    latch_blanking: 4
    brightness: 255
    lambda: |-
      id(tracker).draw_schedule();

font:
  - file: "fonts/Pixolletta8px.ttf"
    id: pixolletta
    size: 10
    glyphs:
      - abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.,:;!?()"'-+/*=%@#[]{}<>|&^~
      - " "

time:
  - platform: sntp
    id: sntp_time
    timezone: America/Los_Angeles

color:
  - id: rapidride_red
    hex: "F50046"
  - id: e_line_red
    hex: "9C182F"
  - id: route_44_purple
    hex: "840AFD"

transit_tracker:
  id: tracker
  base_url: "wss://tt.horner.tj/"
  limit: 12
  #list_mode: "nextPerRoute"
  #list_mode: "sequential"
  list_mode: "doubleTime"
  scroll_headsigns: true
  show_units: "short"
  #show_units: "long"
  #show_units: "none"
  stops:
    - stop_id: "st:1_29557"
      routes:
        - "st:1_100224"
    - stop_id: "st:1_29231"
      routes:
        - "st:1_100224"
    - stop_id: "st:1_75408"
      routes:
        - "st:1_102615"
  styles:
    - route_id: "st:1_102615"
      name: "E"
      color: e_line_red
    - route_id: "st:1_100224"
      name: "44"
      color: route_44_purple
  abbreviations:
    - from: "Seattle"
      to: ""
    - from: "Ballard Wallingford"
      to: "Ballard"
    - from: "University Of Washington Medical Center Wallingford"
      to: "UW"
    - from: "University District"
      to: "UW"

globals:
  - id: display_brightness
    type: int
    restore_value: yes
    initial_value: '150'

interval:
  - interval: 60s
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (!time.is_valid()) return;

          int month = time.month;
          int hour = time.hour;
          int target_b = 50; // Default to half/night brightness (approx 50%)

          // Oct (10) to Feb (2)
          bool is_winter = (month >= 10 || month <= 2);

          if (is_winter) {
             // 9 am - 5 pm (17) -> Max
             if (hour >= 9 && hour < 17) {
               target_b = 125;
             }
          } else {
             // Mar (3) to Sep (9)
             // 8 am - 7 pm (19) -> Max
             if (hour >= 8 && hour < 19) {
               target_b = 125;
             }
          }

          // Only update if changed to avoid overriding manual adjustments *too* aggressively,
          // though this will still reset manual changes every minute if they differ from schedule.
          if (id(display_brightness) != target_b) {
            ESP_LOGD("automation", "Updating brightness to %d based on schedule", target_b);
            id(display_brightness) = target_b;
            id(matrix).set_brightness(target_b);
          }

binary_sensor:
  - platform: gpio
    pin:
      number: 6
      mode: INPUT_PULLUP
      inverted: true
    name: "Button Up"
    on_press:
      - lambda: |-
          int b = id(display_brightness);
          b += 25;
          if (b > 255) b = 255;
          id(display_brightness) = b;
          id(matrix).set_brightness(b);

  - platform: gpio
    pin:
      number: 7
      mode: INPUT_PULLUP
      inverted: true
    name: "Button Down"
    on_press:
      - lambda: |-
          int b = id(display_brightness);
          b -= 25;
          if (b < 0) b = 0;
          id(display_brightness) = b;
          id(matrix).set_brightness(b);
